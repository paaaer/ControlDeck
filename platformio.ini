; ControlDeckCore — PlatformIO configuration
; Target: ESP32-WROOM-32 DevKit (CP2102 USB-UART bridge)
; Framework: Arduino
; OTA: ArduinoOTA over WiFi

[env:esp32_wroom32]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Upload over USB (initial flash via CP2102)
upload_speed = 921600

; OTA upload target (set IP or mDNS after first flash)
; Usage: pio run -t upload --upload-port controldeck.local
;        pio run -t upload --upload-port 192.168.x.x
upload_protocol = espota
; upload_port = controldeck.local   ; <-- uncomment after first WiFi boot

; Build flags — no CDC flags needed, CP2102 handles USB-UART bridging
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Libraries
lib_deps =
    tzapu/WiFiManager               ; captive portal provisioning
    ; ArduinoOTA and ESPmDNS are bundled with arduino-esp32, no extra lib needed

; Partition scheme with OTA support (4MB flash, ~1.8MB per OTA slot)
board_build.partitions = min_spiffs.csv
