; ControlDeckCore — PlatformIO configuration
; Target: ESP32-WROOM-32 DevKit (CP2102 USB-UART bridge)
; Framework: Arduino
; OTA: ArduinoOTA over WiFi

[env:esp32_wroom32]
platform = espressif32
board = esp32dev
framework = arduino

; Fix for ModuleNotFoundError: No module named 'intelhex'
platform_packages = tool-esptoolpy@~1.40501.0

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; Upload over USB (initial flash via CP2102)
upload_speed = 921600
upload_protocol = esptool

; OTA upload — uncomment BOTH lines and comment upload_protocol above
; upload_protocol = espota
; upload_port = controldeck.local

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Libraries
lib_deps =
    tzapu/WiFiManager               ; captive portal WiFi provisioning
    ; WebServer, ArduinoOTA, ESPmDNS, Preferences bundled with arduino-esp32

; Partition scheme with OTA support (4MB flash)
board_build.partitions = min_spiffs.csv
